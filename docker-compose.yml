services:
  gophermart:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/arm64
    ports:
      - "8080:8080"
    environment:
      LOYALTY_SYSTEM_SERVER_ADDRESS: ":8080"
      LOYALTY_SYSTEM_STORAGE_HOST: postgres
      LOYALTY_SYSTEM_STORAGE_PORT: "5432"
      LOYALTY_SYSTEM_STORAGE_DATABASE: loyalty-system
      LOYALTY_SYSTEM_STORAGE_USER: developer
      LOYALTY_SYSTEM_STORAGE_PASSWORD: my_pass
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16.3
    platform: linux/arm64
    environment:
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: my_pass
      POSTGRES_DB: loyalty-system
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer -d loyalty-system"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    platform: linux/arm64
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
